<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Taskly</title>
        <link rel="stylesheet" href="style.css" />
        <link
            href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=Caveat:wght@500;700&display=swap"
            rel="stylesheet" />
    </head>
    <body>
<!--HEADER -->
        <header class="site-header">
            <div class="header-inner">
                <div class="brand">
                    <svg class="brand-icon" viewBox="0 0 36 36" fill="none"
                        xmlns="http://www.w3.org/2000/svg">
                        <rect x="4" y="2" width="22" height="28" rx="3"
                            fill="#e8dcc8" stroke="#b89e7a"
                            stroke-width="1.5" />
                        <rect x="8" y="6" width="14" height="2" rx="1"
                            fill="#b89e7a" />
                        <rect x="8" y="11" width="14" height="2" rx="1"
                            fill="#b89e7a" />
                        <rect x="8" y="16" width="9" height="2" rx="1"
                            fill="#b89e7a" />
                        <circle cx="28" cy="28" r="7" fill="#d4a96a" />
                        <path d="M25 28l2 2 4-4" stroke="#fff" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <div>
                        <h1 class="brand-name">Taskly</h1>
                        <p class="brand-sub">yes, another to-do app</p>
                    </div>
                </div>
                <div class="header-stats">
                    <span id="global-stats" class="global-stats">loading...</span>
                </div>
            </div>
        </header>

<!-- MAIN LAYOUT -->
        <main class="app-layout">
 <!-- SIDEBAR: Lists -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <span class="sidebar-title">Your Lists</span>
                    <button class="btn-icon" id="btn-new-list" title="New list">
                        <svg viewBox="0 0 20 20" fill="none"><circle cx="10"
                                cy="10" r="8" stroke="currentColor"
                                stroke-width="1.5" /><path d="M10 7v6M7 10h6"
                                stroke="currentColor" stroke-width="1.5"
                                stroke-linecap="round" /></svg>
                    </button>
                </div>

                <ul class="list-nav" id="list-nav"></ul>

                <div class="sidebar-footer">
                    <button class="filter-btn active" data-filter="all"
                        id="filter-all">
                        <svg viewBox="0 0 18 18" fill="none"><rect x="2" y="2"
                                width="14" height="14" rx="2"
                                stroke="currentColor" stroke-width="1.5" /><path
                                d="M5 9h8M5 6h8M5 12h5" stroke="currentColor"
                                stroke-width="1.3"
                                stroke-linecap="round" /></svg>
                        All
                    </button>
                    <button class="filter-btn" data-filter="active"
                        id="filter-active">
                        <svg viewBox="0 0 18 18" fill="none"><circle cx="9"
                                cy="9" r="7" stroke="currentColor"
                                stroke-width="1.5" /><circle cx="9" cy="9" r="3"
                                fill="currentColor" /></svg>
                        Active
                    </button>
                    <button class="filter-btn" data-filter="completed"
                        id="filter-completed">
                        <svg viewBox="0 0 18 18" fill="none"><circle cx="9"
                                cy="9" r="7" stroke="currentColor"
                                stroke-width="1.5" /><path d="M6 9l2 2 4-4"
                                stroke="currentColor" stroke-width="1.5"
                                stroke-linecap="round"
                                stroke-linejoin="round" /></svg>
                        Done
                    </button>
                    <button class="filter-btn" data-filter="today"
                        id="filter-today">
                        <svg viewBox="0 0 18 18" fill="none"><rect x="2" y="3"
                                width="14" height="13" rx="2"
                                stroke="currentColor" stroke-width="1.5" /><path
                                d="M6 2v2M12 2v2M2 7h14" stroke="currentColor"
                                stroke-width="1.3"
                                stroke-linecap="round" /></svg>
                        Today
                    </button>
                </div>
            </aside>

<!-- MAIN PANEL: Tasks -->
            <section class="task-panel">

<!-- List Header -->
                <div class="panel-header">
                    <div class="panel-title-wrap">
                        <h2 class="panel-title" id="panel-title">Pick a
                            list</h2>
                        <span class="panel-count" id="panel-count"></span>
                    </div>
                    <div class="panel-actions" id="panel-actions"
                        style="display:none;">
                        <button class="btn-ghost btn-sm" id="btn-rename-list">
                            <svg viewBox="0 0 18 18" fill="none"><path
                                    d="M3 13l9-9 3 3-9 9H3v-3z"
                                    stroke="currentColor" stroke-width="1.5"
                                    stroke-linejoin="round" /></svg>
                            Rename
                        </button>
                        <button class="btn-ghost btn-sm danger"
                            id="btn-delete-list">
                            <svg viewBox="0 0 18 18" fill="none"><path
                                    d="M4 6h10M7 6V4h4v2M14 6l-1 9H5L4 6"
                                    stroke="currentColor" stroke-width="1.5"
                                    stroke-linecap="round"
                                    stroke-linejoin="round" /></svg>
                            Delete list
                        </button>
                    </div>
                </div>

<!-- Add Task Bar -->
                <div class="add-task-bar" id="add-task-bar"
                    style="display:none;">
                    <div class="add-task-row">
                        <input type="text" id="task-input" class="task-input"
                            placeholder="Add a task.."
                            maxlength="120" />
                        <button class="btn-primary" id="btn-add-task">
                            <svg viewBox="0 0 18 18" fill="none"><path
                                    d="M9 4v10M4 9h10" stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round" /></svg>
                            Add
                        </button>
                    </div>
                    <div class="add-task-meta">
                        <select class="meta-select" id="task-priority">
                            <option value="low">Low priority</option>
                            <option value="medium" selected>Medium
                                priority</option>
                            <option value="high">High priority</option>
                        </select>
                        <input type="datetime-local" id="task-due"
                            class="meta-input" />
                        <label class="meta-hint">due date (optional)</label>
                    </div>
                </div>

<!-- Task List -->
                <div class="task-list-wrap">
                    <ul class="task-list" id="task-list"></ul>
                    <div class="empty-state" id="empty-state"
                        style="display:none;">
                        <svg class="empty-icon" viewBox="0 0 80 80" fill="none">
                            <circle cx="40" cy="40" r="36" fill="#f5ede0" />
                            <path d="M28 40c0-6.6 5.4-12 12-12s12 5.4 12 12"
                                stroke="#c9a97a" stroke-width="2.5"
                                stroke-linecap="round" />
                            <circle cx="32" cy="36" r="2" fill="#c9a97a" />
                            <circle cx="48" cy="36" r="2" fill="#c9a97a" />
                            <path d="M32 50s2-3 8-3 8 3 8 3" stroke="#c9a97a"
                                stroke-width="2" stroke-linecap="round" />
                        </svg>
                        <p class="empty-title" id="empty-title">Nothing here
                            yet.</p>
                        <p class="empty-sub" id="empty-sub">Your future self
                            will thank you for starting.</p>
                    </div>
                </div>

            </section>
        </main>

<!-- MODAL: New / Rename List -->
        <div class="modal-overlay" id="modal-list" style="display:none;">
            <div class="modal">
                <h3 class="modal-title" id="modal-list-title">New List</h3>
                <input type="text" class="modal-input" id="modal-list-input"
                    placeholder="e.g. World domination" maxlength="40" />
                <div class="modal-emoji-row" id="modal-emoji-row">
                    <span class="emoji-label">Pick a vibe:</span>
                    <div class="emoji-options" id="emoji-options">
                        <button class="emoji-opt selected"
                            data-emoji="&#128203;">&#128203;</button>
                        <button class="emoji-opt"
                            data-emoji="&#127968;">&#127968;</button>
                        <button class="emoji-opt"
                            data-emoji="&#128188;">&#128188;</button>
                        <button class="emoji-opt"
                            data-emoji="&#127775;">&#127775;</button>
                        <button class="emoji-opt"
                            data-emoji="&#128170;">&#128170;</button>
                        <button class="emoji-opt"
                            data-emoji="&#127880;">&#127880;</button>
                        <button class="emoji-opt"
                            data-emoji="&#128240;">&#128240;</button>
                        <button class="emoji-opt"
                            data-emoji="&#9749;">&#9749;</button>
                    </div>
                </div>
                <div class="modal-actions">
                    <button class="btn-ghost"
                        id="modal-list-cancel">Cancel</button>
                    <button class="btn-primary"
                        id="modal-list-confirm">Create</button>
                </div>
            </div>
        </div>

<!-- MODAL: Edit Task -->
        <div class="modal-overlay" id="modal-task" style="display:none;">
            <div class="modal">
                <h3 class="modal-title">Edit Task</h3>
                <input type="text" class="modal-input" id="modal-task-input"
                    maxlength="120" />
                <div class="modal-row">
                    <select class="meta-select full" id="modal-task-priority">
                        <option value="low">Low priority</option>
                        <option value="medium">Medium priority</option>
                        <option value="high">High priority</option>
                    </select>
                </div>
                <div class="modal-row">
                    <input type="datetime-local" class="meta-input full"
                        id="modal-task-due" />
                </div>
                <div class="modal-actions">
                    <button class="btn-ghost"
                        id="modal-task-cancel">Cancel</button>
                    <button class="btn-primary" id="modal-task-confirm">Save
                        changes</button>
                </div>
            </div>
        </div>

<!-- TOAST -->
        <div class="toast" id="toast"></div>

        <script src="app.js"></script>
    </body>
</html>
